<!DOCTYPE html>
<html lang="es">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>Dashboard Maskot</title>


    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/a0994db117.js" crossorigin="anonymous"></script>


    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">


    <!-- CSS -->
    <link rel="stylesheet" href="../css/dashboard.css">
</head>


<body>


    <div class="dashboard-layout">


        <!-- SIDEBAR -->


        <aside class="sidebar">


            <div class="sidebar-logo">
                <img src="../img/Logo.png" alt="Logo">


                <h2>Maskot</h2>


                <p>Panel administrador</p>
            </div>


            <nav class="sidebar-menu">


                <a href="../Cliente/cliente.html" >
                    <i class="fa-solid fa-users"></i>
                    Usuarios
                </a>


                <a href="#">
                    <i class="fa-solid fa-box"></i>
                    Productos
                </a>


                <a href="#">
                    <i class="fa-solid fa-cart-shopping"></i>
                    Ventas
                </a>


                <a href="./Reprtes.html">
                    <i class="fa-solid fa-chart-line"></i>
                    Reportes
                </a>


                <a href="../Administrador/dashboard.html">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    Salir
                </a>


            </nav>


        </aside>


        <!-- CONTENIDO -->


        <main class="dashboard-main">


            <!-- TOPBAR -->


            <header class="topbar">


                <div>
                    <h1>Dashboard</h1>


                    <p>
                        Bienvenido al panel administrativo de Maskot.
                    </p>
                </div>


                <div class="admin-info">


                    <i class="fa-solid fa-circle-user"></i>


                    <span>Administrador</span>


                </div>


            </header>


            <!-- CARDS -->


            <section class="row g-4 mb-4">


                <div class="col-lg-4 col-md-6">


                    <div class="card-resumen">


                        <i class="fa-solid fa-users"></i>


                        <div>
                            <h3>128</h3>
                            <p>Usuarios registrados</p>
                        </div>


                    </div>


                </div>


                <div class="col-lg-4 col-md-6">


                    <div class="card-resumen">


                        <i class="fa-solid fa-box"></i>


                        <div>
                            <h3>24</h3>
                            <p>Productos activos</p>
                        </div>


                    </div>


                </div>


                <div class="col-lg-4 col-md-12">


                    <div class="card-resumen">


                        <i class="fa-solid fa-cart-shopping"></i>


                        <div>
                            <h3>15</h3>
                            <p>Ventas del día</p>
                        </div>


                    </div>


                </div>


            </section>


           
        </main>


    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


    <script src="../js/dashboard.js"></script>


</body>


</html>
