<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="../css/index.css">

</head>
<body>

    <header>
        <nav class="navbar navbar-expand-lg navbar-maskot">
            <div class="container">
                <a href="#" class="navbar-brand d-flex align-items-center gap-2">
                    <img src="../img/Logo.png" alt="Logo Maskot" class="logo">
                    <span class="marca">Maskot</span>
                </a>
 
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="menuPrincipal">
                    <ul class="navbar-nav ms-auto align-items-lg-center gap-3">
                        <li class="nav-item"> <a class="nav-link opcion-menu" href="#">Inicio</a></li>
                        <li class="nav-item"> <a class="nav-link opcion-menu" href="#">Servicios</a></li>
                        <li class="nav-item"> <a class="nav-link opcion-menu" href="#">Contáctenos</a></li>
                        <li class="nav-item">
                            <button class="btn btn-login-nav" data-bs-toggle="modal" data-bs-target="#loginModal">Login </button>
                        </li>
                    </ul>
                </div>
 
            </div>
 
        </nav>
    </header>
    <div class="modal fade" id="loginModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content modal-login">
                    <div class="model-header border-0">
                        <h2 class="modal-title w-100 text-center">Iniciar Sesión</h2>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body">
                        <form action="">
                            <div class="mb-3">
                                <label for="email" class="from-label">Correo Electrónico</label>
                                <input type="email" class="from-control" id="email" placeholder="ingresa tu correo" required>
                            </div>

                            <div class="mb-4">
                                <label for="password" class="from-label">Contraseña</label>
                                <input type="password" class="from-control" id="password" placeholder="Ingresa tu contraseña" required>
                            </div>
                        </form>
                    </div>

            </div>
        </div>
    </div>
    


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

        <script src="../js/index.js"></script>
</body>
</html>
